# Build the docs site from docs/llms.md and deploy to GitHub Pages.
name: Deploy docs to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  # Daily rebuild so the displayed CLI version, version.json, and the
  # "Recent releases" section track new specnaut/specnaut-cli releases without a
  # manual trigger (this repo has no CLI source to push on a release).
  schedule:
    - cron: "0 6 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs between an
# in-progress run and the latest queued. Don't cancel an in-flight production
# deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build docs
        run: deno task docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "docs-dist"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
